<!DOCTYPE html>
<html>
<head>
<title>Battle Royale PRO</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body{margin:0;background:black;color:white;font-family:Arial;overflow:hidden;}
#menu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
input,button{padding:10px;margin:10px;font-size:16px;}
canvas{display:none;background:#111;}
#ui{position:absolute;top:10px;left:10px;}
#ranking{position:absolute;top:10px;right:10px;text-align:right;}
</style>
</head>
<body>


<div id="menu">
<h1>🔥 BATTLE ROYALE PRO 🔥</h1>
<input type="text" id="nameInput" placeholder="Tu nombre"><br>
<input type="color" id="colorPicker"><br>
<button onclick="startGame()">JUGAR</button>
</div>


<div id="ui"></div>
<div id="ranking"></div>


<canvas id="game"></canvas>


<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>


<script>
const socket=io();
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;


let MAP_SIZE;
let players={},bullets=[],zoneRadius;
let myId;
let keys={};
let started=false;


let savedCoins = localStorage.getItem("coins") || 0;


function startGame(){


    const name=document.getElementById("nameInput").value || "Player";
    const color=document.getElementById("colorPicker").value;


    socket.emit("join",{name,color});


    document.getElementById("menu").style.display="none";
    canvas.style.display="block";
    started=true;
}


socket.on("init",data=>{
    myId=data.id;
    players=data.players;
    MAP_SIZE=data.MAP_SIZE;
});


socket.on("update",data=>{
    players=data.players;
    bullets=data.bullets;
    zoneRadius=data.zoneRadius;


    if(players[myId]){
        localStorage.setItem("coins",players[myId].coins);
    }
});


canvas.addEventListener("click", shoot);


document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);


function shoot(e){
    if(!players[myId]) return;


    const mouseX = e.clientX;
    const mouseY = e.clientY;


    const camX = players[myId].x - canvas.width/2;
    const camY = players[myId].y - canvas.height/2;


    const worldX = mouseX + camX;
    const worldY = mouseY + camY;


    const dx = worldX - players[myId].x;
    const dy = worldY - players[myId].y;


    const length = Math.sqrt(dx*dx+dy*dy);
    const speed = 15;


    socket.emit("shoot",{
        x:players[myId].x,
        y:players[myId].y,
        dx:(dx/length)*speed,
        dy:(dy/length)*speed
    });
}


function move(){
    if(!started || !players[myId]) return;


    let p=players[myId];


    if(keys["w"]) p.y-=6;
    if(keys["s"]) p.y+=6;
    if(keys["a"]) p.x-=6;
    if(keys["d"]) p.x+=6;


    socket.emit("move",{x:p.x,y:p.y});
}


function draw(){
    if(!started || !players[myId]) return;


    ctx.clearRect(0,0,canvas.width,canvas.height);


    let camX=players[myId].x-canvas.width/2;
    let camY=players[myId].y-canvas.height/2;


    ctx.save();
    ctx.translate(-camX,-camY);


    ctx.strokeStyle="blue";
    ctx.beginPath();
    ctx.arc(MAP_SIZE/2,MAP_SIZE/2,zoneRadius,0,Math.PI*2);
    ctx.stroke();


    for(let id in players){
        let p=players[id];
        ctx.fillStyle=p.color;
        ctx.beginPath();
        ctx.arc(p.x,p.y,15,0,Math.PI*2);
        ctx.fill();


        ctx.fillStyle="white";
        ctx.fillText(p.name,p.x-15,p.y-20);
    }


    ctx.fillStyle="yellow";
    bullets.forEach(b=>{
        ctx.beginPath();
        ctx.arc(b.x,b.y,5,0,Math.PI*2);
        ctx.fill();
    });


    ctx.restore();


    let me=players[myId];


    document.getElementById("ui").innerHTML=
        "❤️ "+Math.floor(me.hp)+
        " | 🔫 "+me.kills+
        " | 💰 "+me.coins+
        " | ⭐ "+me.level;


    // ranking
    let sorted = Object.values(players).sort((a,b)=>b.kills-a.kills);
    let rankHTML="<b>🏆 Ranking</b><br>";
    sorted.slice(0,5).forEach(p=>{
        rankHTML+=p.name+" - "+p.kills+"<br>";
    });
    document.getElementById("ranking").innerHTML=rankHTML;
}


function loop(){
    move();
    draw();
    requestAnimationFrame(loop);
}


loop();
</script>


</body>
</html>
