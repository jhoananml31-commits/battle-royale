<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Battle Royale</title>
<script src="/socket.io/socket.io.js"></script>
<style>
body { margin:0; background:#111; color:white; font-family:Arial; text-align:center; }
button { padding:10px; margin:5px; }
canvas { background:#222; display:none; }
#rooms { margin-top:20px; }
</style>
</head>
<body>


<h1>🔥 Battle Royale</h1>


<div id="menu">
    <button onclick="createRoom()">Crear Sala</button>
    <div id="rooms"></div>
</div>


<canvas id="game"></canvas>


<script>
const socket = io();
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");


canvas.width = window.innerWidth;
canvas.height = window.innerHeight;


let playerId;
let players = {};
let bullets = {};


socket.emit("getRooms");


socket.on("roomsList", (rooms) => {
    let div = document.getElementById("rooms");
    div.innerHTML = "<h3>Salas Disponibles:</h3>";


    rooms.forEach(room => {
        div.innerHTML += `<button onclick="joinRoom('${room}')">${room}</button><br>`;
    });
});


function createRoom(){
    let name = prompt("Nombre de la sala:");
    if(name){
        socket.emit("createRoom", name);
    }
}


function joinRoom(name){
    socket.emit("joinRoom", name);
}


socket.on("init", (data) => {
    playerId = data.id;
    document.getElementById("menu").style.display="none";
    canvas.style.display="block";
});


socket.on("update", (data) => {
    players = data.players;
    bullets = data.bullets;
    draw();
});


function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);


    let me = players[playerId];
    if(!me) return;


    let offsetX = canvas.width/2 - me.x;
    let offsetY = canvas.height/2 - me.y;


    for(let id in players){
        let p = players[id];
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x + offsetX, p.y + offsetY, 15, 0, Math.PI*2);
        ctx.fill();
    }


    bullets.forEach(b => {
        ctx.fillStyle="yellow";
        ctx.beginPath();
        ctx.arc(b.x + offsetX, b.y + offsetY, 5, 0, Math.PI*2);
        ctx.fill();
    });
}


let keys = {};


document.addEventListener("keydown", e=>{
    keys[e.key] = true;
});


document.addEventListener("keyup", e=>{
    keys[e.key] = false;
});


setInterval(() => {


    let me = players[playerId];
    if(!me) return;


    let moved = false;


    if(keys["w"]) { me.y -= 5; moved = true; }
    if(keys["s"]) { me.y += 5; moved = true; }
    if(keys["a"]) { me.x -= 5; moved = true; }
    if(keys["d"]) { me.x += 5; moved = true; }


    if(moved){
        socket.emit("move", { x: me.x, y: me.y });
    }


}, 1000/60);




canvas.addEventListener("click", e=>{
    let me = players[playerId];
    if(!me) return;


    let dx = e.clientX - canvas.width/2;
    let dy = e.clientY - canvas.height/2;
    let dist = Math.sqrt(dx*dx+dy*dy);


    socket.emit("shoot",{
        x:me.x,
        y:me.y,
        dx:(dx/dist)*15,
        dy:(dy/dist)*15
    });
});
</script>


</body>
</html>
